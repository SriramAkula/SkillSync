    environment:
      JAVA_OPTS: "-Dspring.profiles.active=docker"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/skill_session?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: "1234"
      SPRING_ZIPKIN_BASE_URL: "http://zipkin:9411"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka/"
    command: bash -c "mvn clean spring-boot:run"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - skillsync-network

  # Mentor Service
  mentor-service:
