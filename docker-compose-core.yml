version: '3.8'

services:
  # MySQL Database (shared by all microservices)
  mysql:
    image: mysql:8.0
    container_name: skillsync-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: skill_auth
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - skillsync-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL for Zipkin (persistent storage)
  zipkin-mysql:
    image: mysql:8.0
    container_name: zipkin-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: zipkin
      MYSQL_USER: zipkin
      MYSQL_PASSWORD: zipkin123
    ports:
      - "3307:3306"
    volumes:
      - zipkin-mysql-data:/var/lib/mysql
    networks:
      - skillsync-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zipkin Distributed Tracing
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin-server
    ports:
      - "9411:9411"
    environment:
      STORAGE_TYPE: mysql
      MYSQL_HOST: zipkin-mysql
      MYSQL_USER: zipkin
      MYSQL_PASS: zipkin123
      MYSQL_DB: zipkin
    depends_on:
      zipkin-mysql:
        condition: service_healthy
    networks:
      - skillsync-network

  # Eureka Server
  eureka-server:
    image: maven:3.9-eclipse-temurin-17
    container_name: eureka-server
    working_dir: /app
    volumes:
      - ./eureka-server:/app
    ports:
      - "8761:8761"
    environment:
      JAVA_OPTS: "-Dspring.profiles.active=docker"
      SPRING_ZIPKIN_BASE_URL: "http://zipkin:9411"
    command: bash -c "mvn clean spring-boot:run"
    depends_on:
      zipkin:
        condition: service_started
    networks:
      - skillsync-network

  # API Gateway
  api-gateway:
    image: maven:3.9-eclipse-temurin-21
    container_name: api-gateway
    working_dir: /app
    volumes:
      - ./api-gateway:/app
    ports:
      - "9090:9090"
    environment:
      JAVA_OPTS: "-Dspring.profiles.active=docker"
      SPRING_ZIPKIN_BASE_URL: "http://zipkin:9411"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka/"
    command: bash -c "mvn clean spring-boot:run"
    depends_on:
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_started
    networks:
      - skillsync-network

  # Auth Service
  auth-service:
    image: maven:3.9-eclipse-temurin-17
    container_name: auth-service
    working_dir: /app
    volumes:
      - ./auth-service:/app
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/skill_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: "1234"
      SPRING_ZIPKIN_BASE_URL: "http://zipkin:9411"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka/"
      SPRING_APPLICATION_NAME: "auth-service"
    command: bash -c "mvn clean spring-boot:run"
    depends_on:
      mysql:
        condition: service_healthy
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_started
    networks:
      - skillsync-network

  # User Service
  user-service:
    image: maven:3.9-eclipse-temurin-17
    container_name: user-service
    working_dir: /app
    volumes:
      - ./user-service:/app
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/skill_user?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: "1234"
      SPRING_ZIPKIN_BASE_URL: "http://zipkin:9411"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka/"
      SPRING_APPLICATION_NAME: "user-service"
    command: bash -c "mvn clean spring-boot:run"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - skillsync-network

  # Skill Service
  skill-service:
    image: maven:3.9-eclipse-temurin-17
    container_name: skill-service
    working_dir: /app
    volumes:
      - ./skill-service:/app
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/skill_skill?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: "1234"
      SPRING_ZIPKIN_BASE_URL: "http://zipkin:9411"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka/"
      SPRING_APPLICATION_NAME: "skill-service"
    command: bash -c "mvn clean spring-boot:run"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - skillsync-network

  # Session Service
  session-service:
