# Trigger build for Messaging Service and Frontend UI Integration
name: SkillSync CI/CD Pipeline

on:
  push:
    branches:
      - main
      # - development
      # - 'feature/**'
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all service images (Bypass path filter)'
        required: false
        type: boolean
        default: false

jobs:
  # ───────────────
  # JOB 1: QUALITY CHECKS (Sonar & Lint)
  # ───────────────
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Backend Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ (github.ref_name == 'main' || github.ref_name == 'development') && (github.event.before != '0000000000000000000000000000000000000000' && github.event.before || github.ref_name) || 'development' }}
          filters: |
            changed:
              - 'backend/**'

      - name: Set up JDK 21
        if: github.event.inputs.force_rebuild == 'true' || steps.filter.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Maven Verify & Sonar Scan
        if: github.event.inputs.force_rebuild == 'true' || steps.filter.outputs.changed == 'true'
        working-directory: ./backend
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=SriramAkula_SkillSync \
            -Dsonar.projectName="SkillSync" \
            -Dsonar.organization=sriramakula \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Frontend Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ (github.ref_name == 'main' || github.ref_name == 'development') && (github.event.before != '0000000000000000000000000000000000000000' && github.event.before || github.ref_name) || 'development' }}
          filters: |
            changed:
              - 'frontend/**'

      - name: Setup Node.js
        if: github.event.inputs.force_rebuild == 'true' || steps.filter.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Frontend Dependencies
        if: github.event.inputs.force_rebuild == 'true' || steps.filter.outputs.changed == 'true'
        working-directory: ./frontend
        run: npm ci

      - name: Run Frontend Lint
        if: github.event.inputs.force_rebuild == 'true' || steps.filter.outputs.changed == 'true'
        working-directory: ./frontend
        run: npm run lint

  # ───────────────
  # JOB 2: BUILD & PUSH
  # ───────────────
  build-and-push:
    needs: [backend-quality, frontend-quality]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [
          "api-gateway", "auth-service", "user-service", "skill-service",
          "session-service", "mentor-service", "group-service", "review-service",
          "notification-service", "payment-gateway", "messaging-service",
          "eureka-server", "config-server", "frontend"
        ]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Changes in Service
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ (github.ref_name == 'main' || github.ref_name == 'development') && (github.event.before != '0000000000000000000000000000000000000000' && github.event.before || github.ref_name) || 'development' }}
          filters: |
            changed:
              - '${{ matrix.service == 'frontend' && 'frontend/**' || format('backend/{0}/**', matrix.service) }}'

      - name: Azure Login
        if: github.event.inputs.force_rebuild == 'true' || steps.filter.outputs.changed == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        if: github.event.inputs.force_rebuild == 'true' || steps.filter.outputs.changed == 'true'
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image
        if: github.event.inputs.force_rebuild == 'true' || steps.filter.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'frontend' && './frontend' || format('./backend/{0}', matrix.service) }}
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/skillsync-${{ matrix.service }}:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/skillsync-${{ matrix.service }}:${{ github.sha }}

      - name: Cleanup Old ACR Tags
        if: github.event.inputs.force_rebuild == 'true' || steps.filter.outputs.changed == 'true'
        continue-on-error: true
        run: |
          REPO="skillsync-${{ matrix.service }}"
          TAGS_TO_DELETE=$(az acr repository show-tags -n ${{ secrets.ACR_LOGIN_SERVER_NAME }} --repository $REPO --orderby time_desc --output tsv | grep -v "latest" | tail -n +6)
          if [ ! -z "$TAGS_TO_DELETE" ]; then
            for tag in $TAGS_TO_DELETE; do
              az acr repository delete -n ${{ secrets.ACR_LOGIN_SERVER_NAME }} --image $REPO:$tag --yes
            done
          fi

  # ───────────────
  # JOB 3: DEPLOY
  # ───────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}
    steps:
      - name: SSH to Azure VM and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: FORCE_REBUILD
          script: |
            cd /home/azureuser/SkillSync
            
            # 1. NETWORK & INFRA PREP (CRITICAL: Must be before Compose commands)
            docker network create skillsync-proxy || true
            
            # 2. DISK PRE-FLIGHT CHECK
            FREE_SPACE=$(df / --output=avail -h | tail -1 | sed "s/[^0-9.]//g")
            echo "Current Free Space: ${FREE_SPACE}G"
            if [ "$(echo "$FREE_SPACE < 1.0" | bc -l)" -eq 1 ]; then
                echo "DISK PRESSURE DETECTED: Running emergency cleanup..."
                sudo journalctl --vacuum-time=1h
                docker system prune -af
            fi

            # 3. HEAVY CLEANUP (If explicitly requested)
            if [ "$FORCE_REBUILD" == "true" ]; then
                echo "FORCE REBUILD: Full system purge..."
                sudo sh -c 'truncate -s 0 /var/lib/docker/containers/*/*-json.log' || true
                sudo apt-get clean
                sudo rm -rf /tmp/*
                docker system prune -af
            fi

            # 4. CODE SYNC
            rm -f .git/index.lock
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            
            # 5. REGISTRY LOGIN
            echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin
            
            # 6. PULL & DEPLOY
            echo "Pulling latest images..."
            docker compose -f backend/docker-compose.infra.yml \
                           -f backend/docker-compose.monitoring.yml \
                           -f backend/docker-compose.services.yml \
                           -f frontend/docker-compose.yml pull
            
            echo "Starting containers..."
            docker compose -f backend/docker-compose.infra.yml \
                           -f backend/docker-compose.monitoring.yml \
                           -f backend/docker-compose.services.yml \
                           -f frontend/docker-compose.yml up -d --force-recreate --remove-orphans
            
            # 7. RECOVER GATEWAY (Nginx Proxy)
            if [ -d "/home/azureuser/nginx-proxy" ]; then
                cd /home/azureuser/nginx-proxy
                docker compose up -d --force-recreate
                cd /home/azureuser/SkillSync
            fi
            
            # 8. POST-DEPLOY STATUS
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            df -h /
            docker system prune -f
            echo "Deployment completed successfully."