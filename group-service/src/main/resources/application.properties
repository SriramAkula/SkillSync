server.port=8086
spring.application.name=group-service
spring.cloud.config.enabled=false
spring.datasource.url=jdbc:mysql://mysql:3306/skill_group?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
management.endpoints.web.exposure.include=health,info
logging.level.root=INFO
logging.level.com.skillsync.group=DEBUG
logging.file.name=logs/group-service.log

# ==========================================
# SPRINGDOC / OPENAPI / SWAGGER
# ==========================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/v3/api-docs

springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.use-root-path=true
springdoc.show-actuator=false
springdoc.enable-spring-security-support=true
springdoc.swagger-ui.display-request-duration=true
springdoc.scan-packages=com.skillsync.group.controller
springdoc.webjars.prefix=/webjars
springdoc.cache.disabled=false


# ==========================================
# ZIPKIN DISTRIBUTED TRACING (Micrometer)
# ==========================================
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
management.tracing.sampling.probability=1.0
management.endpoints.web.exposure.include=health,prometheus,metrics,tracing
management.metrics.export.prometheus.enabled=true
logging.level.io.micrometer.tracing=DEBUG
logging.level.brave=DEBUG

# ==========================================
# REDIS - CQRS CACHING
# ==========================================
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.client-type=lettuce
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.shutdown-timeout=2000ms

# ==========================================
# SPRING CACHE - CQRS PATTERN
# ==========================================
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.interceptor-order=999
