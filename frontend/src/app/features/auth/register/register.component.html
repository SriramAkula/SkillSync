<div
  class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-br from-slate-50 via-white to-secondary-50/30 relative overflow-hidden font-sans">

  <!-- Decorative Blurs -->
  <div class="absolute -top-24 -right-24 w-96 h-96 bg-secondary-200/20 rounded-full blur-3xl animate-pulse"></div>
  <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-primary-200/20 rounded-full blur-3xl animate-pulse"
    style="animation-delay: 2s"></div>

  <div
    class="max-w-md w-full space-y-8 glass-card p-10 relative z-10 animate-drop-in border border-white/40 shadow-2xl">

    <!-- Header -->
    <div class="text-center">
      <div
        class="inline-flex items-center justify-center w-16 h-16 bg-secondary-600 rounded-2xl shadow-xl shadow-secondary-200 mb-6 group hover:rotate-12 transition-transform duration-500">
        <span class="material-icons text-white text-3xl">person_add_alt</span>
      </div>
      <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">Create Account</h2>
      <p class="mt-3 text-sm font-medium text-slate-500">
        Already a member?
        <a routerLink="/login"
          class="text-secondary-600 hover:text-secondary-700 font-bold transition-colors underline-offset-4 hover:underline">Sign
          in instead</a>
      </p>
    </div>

    <!-- Step Indicator (Mini) -->
    <div class="flex justify-center gap-2 mt-8">
      <div class="h-1.5 w-8 rounded-full transition-all duration-500" [class.bg-secondary-600]="step === 'email'"
        [class.bg-slate-200]="step !== 'email'"></div>
      <div class="h-1.5 w-8 rounded-full transition-all duration-500" [class.bg-secondary-600]="step === 'otp'"
        [class.bg-slate-200]="step !== 'otp'"></div>
      <div class="h-1.5 w-8 rounded-full transition-all duration-500" [class.bg-secondary-600]="step === 'details'"
        [class.bg-slate-200]="step !== 'details'"></div>
    </div>

    <!-- STAGES -->
    <div class="mt-8 transition-all duration-300">

      <!-- Step 1: Email Input -->
      @if (step === 'email') {
      <form class="space-y-6 animate-fade-in" (ngSubmit)="sendOtp()">
        <div class="space-y-1.5">
          <label for="email" class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Email
            Address</label>
          <div class="relative group">
            <span
              class="material-icons-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-secondary-500 transition-colors">alternate_email</span>
            <input id="email" name="email" type="email" [(ngModel)]="email" required placeholder="name@example.com"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 pl-12 pr-4 text-sm focus:ring-4 focus:ring-secondary-500/10 focus:border-secondary-500/50 outline-none transition-all placeholder:text-slate-300 font-medium text-slate-700" />
          </div>
        </div>

        <button type="submit" [disabled]="loading || !email"
          class="w-full bg-secondary-600 text-white rounded-2xl py-4 text-sm font-bold shadow-xl shadow-secondary-200 hover:bg-secondary-700 hover:-translate-y-0.5 active:scale-95 transition-all disabled:opacity-70 flex items-center justify-center gap-2">
          @if (loading) {
          <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          } @else {
          <span>Send Verification Code</span>
          <span class="material-icons text-base">send</span>
          }
        </button>
      </form>
      }

      <!-- Step 2: OTP Verification -->
      @if (step === 'otp') {
      <form class="space-y-6 animate-fade-in" (ngSubmit)="verifyOtp()">
        <div class="text-center mb-6">
          <p class="text-sm font-medium text-slate-600">Enter the 6-digit code sent to</p>
          <p class="text-sm font-bold text-secondary-600 truncate">{{email}}</p>
        </div>

        <div class="space-y-1.5">
          <div class="relative group flex justify-center">
            <input id="otp" name="otp" type="text" [(ngModel)]="otp" required maxlength="6" placeholder="------"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl py-4 text-center text-3xl font-mono tracking-[0.5em] focus:ring-4 focus:ring-secondary-500/10 focus:border-secondary-500/50 outline-none transition-all placeholder:text-slate-200 text-slate-700" />
          </div>
        </div>

        <div class="flex gap-3 pt-2">
          <button type="button" (click)="step = 'email'"
            class="w-1/3 bg-slate-100 text-slate-600 rounded-2xl py-4 text-sm font-bold hover:bg-slate-200 transition-all active:scale-95">
            Back
          </button>
          <button type="submit" [disabled]="loading || otp.length < 6"
            class="flex-1 bg-secondary-600 text-white rounded-2xl py-4 text-sm font-bold shadow-xl shadow-secondary-200 hover:bg-secondary-700 hover:-translate-y-0.5 active:scale-95 transition-all disabled:opacity-70 flex items-center justify-center gap-2">
            @if (loading) {
            <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            } @else {
            <span>Verify & Continue</span>
            }
          </button>
        </div>
      </form>
      }

      <!-- Step 3: Registration Details -->
      @if (step === 'details') {
      <form class="space-y-5 animate-fade-in" (ngSubmit)="register()">

        <div class="space-y-1.5">
          <label for="username" class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Username/Full
            Name</label>
          <div class="relative group">
            <span
              class="material-icons-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-secondary-500 transition-colors">person_outline</span>
            <input id="username" name="username" type="text" [(ngModel)]="username" required placeholder="e.g. John Doe"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 pl-12 pr-4 text-sm focus:ring-4 focus:ring-secondary-500/10 focus:border-secondary-500/50 outline-none transition-all placeholder:text-slate-300 font-medium text-slate-700" />
          </div>
        </div>

        <div class="space-y-1.5">
          <label for="password" class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Secure
            Password</label>
          <div class="relative group">
            <span
              class="material-icons-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-secondary-500 transition-colors">lock_open</span>
            <input id="password" name="password" type="password" [(ngModel)]="password" required placeholder="••••••••"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 pl-12 pr-4 text-sm focus:ring-4 focus:ring-secondary-500/10 focus:border-secondary-500/50 outline-none transition-all placeholder:text-slate-300 font-medium text-slate-700" />
          </div>
        </div>

        <div class="space-y-1.5">
          <label for="confirm" class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Confirm
            Password</label>
          <div class="relative group">
            <span
              class="material-icons-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-secondary-500 transition-colors">check_circle_outline</span>
            <input id="confirm" name="confirm" type="password" [(ngModel)]="confirmPassword" required
              placeholder="••••••••"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 pl-12 pr-4 text-sm focus:ring-4 focus:ring-secondary-500/10 focus:border-secondary-500/50 outline-none transition-all placeholder:text-slate-300 font-medium text-slate-700" />
          </div>
        </div>

        <button type="submit" [disabled]="loading || !password || password !== confirmPassword"
          class="w-full bg-secondary-600 text-white rounded-2xl py-4 text-sm font-bold shadow-xl shadow-secondary-200 hover:bg-secondary-700 hover:-translate-y-0.5 active:scale-95 transition-all disabled:opacity-70 flex items-center justify-center gap-2 mt-4">
          @if (loading) {
          <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          } @else {
          <span>Finish Registration</span>
          <span class="material-icons text-base">rocket_launch</span>
          }
        </button>
      </form>
      }

    </div>

  </div>

  <!-- Footer Info -->
  <div class="absolute bottom-6 left-0 right-0 text-center">
    <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Join 5,000+ Learners Worldwide</p>
  </div>

</div>

<style>
  @keyframes fade-in {
    from {
      opacity: 0;
      transform: scale(0.98);
    }

    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  .animate-fade-in {
    animation: fade-in 0.4s ease-out;
  }
</style>
