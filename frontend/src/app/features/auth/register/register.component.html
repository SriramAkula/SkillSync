<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-lg border border-slate-100">
    <div>
      <h2 class="mt-2 text-center text-3xl font-extrabold text-slate-900">Create Account</h2>
      <p class="mt-2 text-center text-sm text-slate-600">
        Already have an account? <a routerLink="/login" class="font-medium text-emerald-600 hover:text-emerald-500 transition">Sign in</a>
      </p>
    </div>

    <!-- Step 1: Email -->
    <form *ngIf="step === 'email'" class="mt-8 space-y-6" (ngSubmit)="sendOtp()">
      <div class="rounded-md shadow-sm">
        <div>
          <label for="email-address" class="sr-only">Email address</label>
          <input id="email-address" name="email" type="email" [(ngModel)]="email" required class="appearance-none rounded relative block w-full px-3 py-3 border border-slate-300 placeholder-slate-500 text-slate-900 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 focus:z-10 sm:text-sm" placeholder="Email address">
        </div>
      </div>
      <div>
        <button type="submit" [disabled]="loading" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-colors disabled:opacity-70">
          Send OTP
        </button>
      </div>
    </form>

    <!-- Step 2: OTP -->
    <form *ngIf="step === 'otp'" class="mt-8 space-y-6" (ngSubmit)="verifyOtp()">
      <p class="text-sm text-center text-slate-600">We've sent a 6-digit code to <span class="font-bold">{{email}}</span></p>
      <div class="rounded-md shadow-sm">
        <div>
          <label for="otp" class="sr-only">Enter OTP</label>
          <input id="otp" name="otp" type="text" [(ngModel)]="otp" required maxlength="6" class="appearance-none rounded relative block w-full px-3 py-3 border border-slate-300 placeholder-slate-500 text-slate-900 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 focus:z-10 text-center text-tracking-widest text-lg font-mono sm:text-sm" placeholder="------">
        </div>
      </div>
      <div class="flex space-x-2">
         <button type="button" (click)="step = 'email'" class="w-1/3 flex justify-center py-3 px-4 border border-slate-300 text-sm font-medium rounded-md bg-white hover:bg-slate-50 text-slate-700">Back</button>
         <button type="submit" [disabled]="loading" class="w-2/3 flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-colors disabled:opacity-70">
          Verify OTP
        </button>
      </div>
    </form>

    <!-- Step 3: Details -->
    <form *ngIf="step === 'details'" class="mt-8 space-y-4" (ngSubmit)="register()">
      <div>
        <label for="username" class="block text-sm font-medium text-slate-700">Username</label>
        <input id="username" name="username" type="text" [(ngModel)]="username" required class="mt-1 appearance-none relative block w-full px-3 py-2 border border-slate-300 rounded-md placeholder-slate-500 text-slate-900 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
        <input id="password" name="password" type="password" [(ngModel)]="password" required class="mt-1 appearance-none relative block w-full px-3 py-2 border border-slate-300 rounded-md placeholder-slate-500 text-slate-900 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
      </div>
      <div>
        <label for="confirm" class="block text-sm font-medium text-slate-700">Confirm Password</label>
        <input id="confirm" name="confirm" type="password" [(ngModel)]="confirmPassword" required class="mt-1 appearance-none relative block w-full px-3 py-2 border border-slate-300 rounded-md placeholder-slate-500 text-slate-900 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
      </div>
      
      <div class="pt-4">
        <button type="submit" [disabled]="loading" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-colors disabled:opacity-70">
          Complete Registration
        </button>
      </div>
    </form>

  </div>
</div>
