<div
  class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-br from-slate-50 via-white to-primary-50/30 relative overflow-hidden font-sans">

  <!-- Decorative Blurs -->
  <div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-200/20 rounded-full blur-3xl animate-pulse"></div>
  <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-secondary-200/20 rounded-full blur-3xl animate-pulse"
    style="animation-delay: 2s"></div>

  <div
    class="max-w-md w-full space-y-8 glass-card p-10 relative z-10 animate-drop-in border border-white/40 shadow-2xl shadow-primary-900/5">

    <!-- Header -->
    <div class="text-center">
      <div
        class="inline-flex items-center justify-center w-16 h-16 bg-primary-600 rounded-2xl shadow-xl shadow-primary-200 mb-6 group hover:rotate-12 transition-transform duration-500">
        <span class="material-icons text-white text-3xl">auto_awesome</span>
      </div>
      <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">Welcome Back</h2>
      <p class="mt-3 text-sm font-medium text-slate-500">
        New here?
        <a routerLink="/register"
          class="text-primary-600 hover:text-primary-700 font-bold transition-colors underline-offset-4 hover:underline">Create
          an account</a>
      </p>
    </div>

    <!-- Form -->
    <form class="mt-10 space-y-5" (ngSubmit)="login()">

      <!-- Email Input -->
      <div class="space-y-1.5">
        <label for="email" class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Email Address</label>
        <div class="relative group">
          <span
            class="material-icons-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-primary-500 transition-colors">alternate_email</span>
          <input id="email" name="email" type="email" [(ngModel)]="email" required placeholder="name@example.com"
            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 pl-12 pr-4 text-sm focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500/50 outline-none transition-all placeholder:text-slate-300 font-medium text-slate-700" />
        </div>
      </div>

      <!-- Password Input -->
      <div class="space-y-1.5">
        <div class="flex justify-between items-center px-1">
          <label for="password" class="text-xs font-bold uppercase tracking-widest text-slate-400">Password</label>
          <a routerLink="/forgot-password"
            class="text-xs font-bold text-primary-600 hover:text-primary-700 transition">Forgot?</a>
        </div>
        <div class="relative group">
          <span
            class="material-icons-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-primary-500 transition-colors">lock</span>
          <input id="password" name="password" type="password" [(ngModel)]="password" required placeholder="••••••••"
            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 pl-12 pr-4 text-sm focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500/50 outline-none transition-all placeholder:text-slate-300 font-medium text-slate-700" />
        </div>
      </div>

      <!-- Submit Button -->
      <div class="pt-2">
        <button type="submit" [disabled]="loading"
          class="w-full bg-primary-600 text-white rounded-2xl py-4 text-sm font-bold shadow-xl shadow-primary-200 hover:bg-primary-700 hover:-translate-y-0.5 active:scale-95 transition-all disabled:opacity-70 disabled:cursor-not-allowed flex items-center justify-center gap-3">
          @if (loading) {
          <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
            viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
          </svg>
          <span>Verifying...</span>
          } @else {
          <span>Sign In to Your Account</span>
          <span class="material-icons text-base">arrow_forward</span>
          }
        </button>
      </div>

      <!-- Divider -->
      <div class="relative py-4">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-slate-100"></div>
        </div>
        <div class="relative flex justify-center">
          <span
            class="bg-white/50 backdrop-blur px-4 text-[10px] font-bold uppercase tracking-widest text-slate-400">Continue
            with Social</span>
        </div>
      </div>

      <!-- Google Button -->
      <button type="button"
        class="w-full bg-white border border-slate-200 rounded-2xl py-3.5 px-4 text-sm font-bold text-slate-700 flex items-center justify-center gap-3 hover:bg-slate-50 transition-all active:scale-95 shadow-sm">
        <svg class="h-5 w-5" viewBox="0 0 24 24">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        <span>Google Account</span>
      </button>

    </form>
  </div>

  <!-- Footer Info -->
  <div class="absolute bottom-6 left-0 right-0 text-center">
    <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">© 2026 SKILLSYNC TECHNOLOGY GROUP</p>
  </div>

</div>
