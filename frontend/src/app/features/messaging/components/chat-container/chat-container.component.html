<div class="chat-container">
  <!-- Sidebar: Conversation List -->
  <app-conversation-list
    [selectedConversationId]="chatStore.currentConversationId"
    (conversationSelected)="onConversationSelected($event)"
    (newChatClicked)="onNewChatClicked()"
  ></app-conversation-list>

  <!-- Main Area -->
  <div class="chat-area">
    @if (chatStore.currentConversationId()) {
      <!-- Header -->
      <app-chat-header
        [conversation]="chatStore.currentConversation"
        (infoClicked)="onInfoClicked()"
        (callClicked)="onCallClicked()"
        (moreClicked)="onMoreClicked()"
      ></app-chat-header>

      <!-- Messages -->
      <app-message-thread
        [currentUserId]="currentUserId"
        [isGroupChat]="isGroupChat"
        (scrolledToTop)="onScrolledToTop()"
        (markAsRead)="onMarkAsRead($event)"
      ></app-message-thread>

      <!-- Input -->
      <app-message-input
        [conversationType]="getConversationType()"
        [isLoading]="chatStore.isLoadingMessages"
        [typingUsers]="chatStore.currentTypingUsers"
        (messageSent)="onMessageSent($event)"
        (typingStatusChanged)="onTypingStatusChanged($event)"
      ></app-message-input>
    } @else {
      <!-- Empty State -->
      <div class="empty-chat-state animate-fade-in">
        <div class="empty-chat-content">
          <div class="empty-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="empty-icon">
              <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 01.865-.501 48.172 48.172 0 003.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0012 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018z" />
            </svg>
          </div>
          <h2>Select a conversation</h2>
          <p>Choose a mentor or peer from the sidebar to start chatting.</p>
          <button class="new-chat-btn" (click)="onNewChatClicked()">
            <span>Start New Conversation</span>
          </button>
        </div>
      </div>
    }
  </div>
</div>
