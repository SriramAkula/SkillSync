<nav class="bg-indigo-600 text-white shadow-md">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <div class="flex items-center">
        <a routerLink="/" class="text-xl font-bold tracking-tight">SkillSync</a>
        <div class="hidden md:block ml-10">
          <div class="flex items-baseline space-x-4">
            <a routerLink="/mentors" class="hover:bg-indigo-500 px-3 py-2 rounded-md font-medium">Find Mentors</a>
            <ng-container *ngIf="authService.currentUser$ | async as user">
              <a *ngIf="authService.hasRole('ROLE_LEARNER') || authService.hasRole('ROLE_MENTOR')" routerLink="/dashboard" class="hover:bg-indigo-500 px-3 py-2 rounded-md font-medium">Dashboard</a>
            </ng-container>
          </div>
        </div>
      </div>
      <div class="hidden md:block">
        <div class="ml-4 flex items-center md:ml-6">
          <ng-container *ngIf="authService.currentUser$ | async as user; else guestLinks">
            <span class="mr-4 text-sm font-medium">{{ user.username }}</span>
            <a routerLink="/profile" class="hover:bg-indigo-500 px-3 py-2 rounded-md font-medium">Profile</a>
            <button (click)="logout()" class="ml-4 bg-indigo-700 hover:bg-indigo-800 px-3 py-2 rounded-md font-medium">Logout</button>
          </ng-container>
          <ng-template #guestLinks>
            <a routerLink="/login" class="hover:bg-indigo-500 px-3 py-2 rounded-md font-medium">Login</a>
            <a routerLink="/register" class="ml-4 bg-emerald-500 hover:bg-emerald-600 px-3 py-2 rounded-md font-medium shadow-sm transition">Sign Up</a>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</nav>
