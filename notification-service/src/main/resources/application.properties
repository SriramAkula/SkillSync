# ==========================================
# SPRINGDOC / OPENAPI / SWAGGER
# ==========================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/v3/api-docs

springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.use-root-path=true
springdoc.show-actuator=false
springdoc.enable-spring-security-support=true
springdoc.swagger-ui.display-request-duration=true
springdoc.scan-packages=com.skillsync.notification.controller
springdoc.webjars.prefix=/webjars
springdoc.cache.disabled=false


# ==========================================
# ZIPKIN DISTRIBUTED TRACING (Micrometer)
# ==========================================
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
management.tracing.sampling.probability=1.0
management.endpoints.web.exposure.include=health,prometheus,metrics,tracing
management.metrics.export.prometheus.enabled=true
logging.level.io.micrometer.tracing=DEBUG
logging.level.brave=DEBUG

# ==========================================
# REDIS - CQRS CACHING
# ==========================================
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.client-type=lettuce
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.shutdown-timeout=2000ms

# ==========================================
# SPRING CACHE - CQRS PATTERN
# ==========================================
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.interceptor-order=999

# ==========================================
# FEIGN CLIENT CONFIGURATION
# ==========================================
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
feign.client.config.default.loggerLevel=basic

# ==========================================
# RESILIENCE4J - CIRCUIT BREAKER FOR FEIGN
# ==========================================
resilience4j.circuitbreaker.instances.mentor-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.mentor-service.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.mentor-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.mentor-service.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.mentor-service.wait-duration-in-open-state=5000
resilience4j.circuitbreaker.instances.mentor-service.reset-timeout-duration=10000

resilience4j.retry.instances.mentor-service.max-attempts=3
resilience4j.retry.instances.mentor-service.wait-duration=1000
resilience4j.retry.instances.mentor-service.retry-exceptions=java.io.IOException,feign.FeignException

resilience4j.circuitbreaker.instances.user-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.user-service.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.user-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.user-service.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.user-service.wait-duration-in-open-state=5000
resilience4j.circuitbreaker.instances.user-service.reset-timeout-duration=10000

resilience4j.retry.instances.user-service.max-attempts=3
resilience4j.retry.instances.user-service.wait-duration=1000
resilience4j.retry.instances.user-service.retry-exceptions=java.io.IOException,feign.FeignException
