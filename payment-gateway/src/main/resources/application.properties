server.port=8089
spring.application.name=payment-gateway
spring.cloud.config.enabled=false

# ==========================================
# MYSQL
# ==========================================
spring.datasource.url=jdbc:mysql://mysql:3306/skill_payment?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# EUREKA
# ==========================================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ==========================================
# RABBITMQ
# ==========================================
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ==========================================
# FEIGN
# ==========================================
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
feign.client.config.default.loggerLevel=basic
feign.lazy-attributes-resolution=true

# ==========================================
# RESILIENCE4J
# ==========================================
resilience4j.circuitbreaker.instances.session-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.session-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.session-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.session-service.wait-duration-in-open-state=10000
resilience4j.circuitbreaker.instances.session-service.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.mentor-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.mentor-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.mentor-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.mentor-service.wait-duration-in-open-state=10000
resilience4j.circuitbreaker.instances.mentor-service.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.retry.instances.session-service.max-attempts=3
resilience4j.retry.instances.session-service.wait-duration=1000
resilience4j.retry.instances.session-service.retry-exceptions=java.io.IOException,feign.FeignException.ServiceUnavailable

resilience4j.retry.instances.mentor-service.max-attempts=3
resilience4j.retry.instances.mentor-service.wait-duration=1000
resilience4j.retry.instances.mentor-service.retry-exceptions=java.io.IOException,feign.FeignException.ServiceUnavailable

# ==========================================
# ZIPKIN
# ==========================================
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
management.tracing.sampling.probability=1.0
management.endpoints.web.exposure.include=health,prometheus,metrics,tracing

# ==========================================
# RAZORPAY
# ==========================================
razorpay.key.id=rzp_test_SWGUsISMJTk4IH
razorpay.key.secret=I8krFpGNIU2r4iuT2j3xxtrn
razorpay.currency=INR

# ==========================================
# LOGGING
# ==========================================
logging.level.root=INFO
logging.level.com.skillsync.payment=DEBUG
logging.file.name=logs/payment-gateway.log

# ==========================================
# SWAGGER
# ==========================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.scan-packages=com.skillsync.payment.controller
