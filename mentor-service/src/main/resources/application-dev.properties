# ==========================================
# MENTOR SERVICE - DEV PROFILE
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:${DB_PORT:3306}/skill_mentor?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.rabbitmq.host=localhost
spring.data.redis.host=localhost
spring.data.redis.port=6379
management.zipkin.tracing.endpoint=http://localhost:${ZIPKIN_PORT:9411}/api/v2/spans
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
logging.level.root=DEBUG
logging.level.com.skillsync.mentor=DEBUG
logging.level.org.hibernate.SQL=DEBUG
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
