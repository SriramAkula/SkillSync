# ==========================================
# AUTH SERVICE - TEST PROFILE
# Used by: mvn test or @SpringBootTest
# ==========================================

# DATABASE - H2 in-memory (no MySQL needed)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# EUREKA - disabled in tests
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
spring.cloud.discovery.enabled=false

# RABBITMQ - disabled in tests (mock via @MockBean)
spring.rabbitmq.host=localhost
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,org.springframework.boot.actuate.autoconfigure.mail.MailHealthContributorAutoConfiguration

# REDIS - disabled in tests
spring.cache.type=none
spring.autoconfigure.exclude[0]=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
spring.autoconfigure.exclude[1]=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
spring.autoconfigure.exclude[2]=org.springframework.boot.actuate.autoconfigure.mail.MailHealthContributorAutoConfiguration

# ZIPKIN - disabled in tests
management.tracing.sampling.probability=0.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# LOGGING - minimal in tests
logging.level.root=WARN
logging.level.com.skillsync.authservice=INFO

# SWAGGER - disabled in tests
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# JWT
jwt.secret=testSecretKey123456789012345678901234567890123456789
jwt.expiration=3600000

# MAIL - disabled in tests (mock via @MockBean)
spring.mail.host=localhost
spring.mail.port=25
