services:
  # Zipkin Distributed Tracing
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin-server
    ports:
      - "9411:9411"
    env_file:
      - .env
    environment:
      STORAGE_TYPE: mysql
      MYSQL_HOST: zipkin-mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${ZIPKIN_MYSQL_USER}
      MYSQL_PASS: ${ZIPKIN_MYSQL_PASSWORD}
      MYSQL_DB: ${ZIPKIN_MYSQL_DATABASE}
    depends_on:
      zipkin-mysql:
        condition: service_healthy
    networks:
      - skillsync-network

  # MySQL for Zipkin (persistent storage)
  zipkin-mysql:
    image: mysql:8.0
    container_name: zipkin-mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${ZIPKIN_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${ZIPKIN_MYSQL_DATABASE}
      MYSQL_USER: ${ZIPKIN_MYSQL_USER}
      MYSQL_PASSWORD: ${ZIPKIN_MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - zipkin-mysql-data:/var/lib/mysql
      - ./zipkin-schema.sql:/docker-entrypoint-initdb.d/zipkin-schema.sql
    networks:
      - skillsync-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL Database (shared by all microservices)
  mysql:
    image: mysql:8.0
    container_name: skillsync-mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_MAIN_DATABASE}
      MYSQL_ROOT_HOST: ${MYSQL_ROOT_HOST}
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - skillsync-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Management
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - skillsync-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - skillsync-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Eureka Server
  eureka-server:
    image: maven:3.9-eclipse-temurin-17
    container_name: eureka-server
    restart: on-failure
    working_dir: /app
    volumes:
      - ./eureka-server:/app
      - maven-repo:/root/.m2
    ports:
      - "8761:8761"
    env_file:
      - .env
    environment:
      JAVA_OPTS: "-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: ${ZIPKIN_ENDPOINT}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
    command: bash -c "mvn spring-boot:run -Dspring-boot.run.jvmArguments='-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}'"
    depends_on:
      zipkin:
        condition: service_started
    networks:
      - skillsync-network

  # API Gateway
  api-gateway:
    image: maven:3.9-eclipse-temurin-21
    container_name: api-gateway
    restart: on-failure
    working_dir: /app
    volumes:
      - ./api-gateway:/app
      - maven-repo:/root/.m2
    ports:
      - "9090:9090"
    env_file:
      - .env
    environment:
      JAVA_OPTS: "-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: ${ZIPKIN_ENDPOINT}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE}
    command: bash -c "mvn spring-boot:run -Dspring-boot.run.jvmArguments='-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}'"
    depends_on:
      mysql:
        condition: service_healthy
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_started
    networks:
      - skillsync-network

  # Auth Service
  auth-service:
    image: maven:3.9-eclipse-temurin-17
    container_name: auth-service
    restart: on-failure
    working_dir: /app
    volumes:
      - ./auth-service:/app
      - maven-repo:/root/.m2
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      JAVA_OPTS: "-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: ${ZIPKIN_ENDPOINT}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE}
    command: bash -c "mvn spring-boot:run -Dspring-boot.run.jvmArguments='-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}'"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_started
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - skillsync-network

  # User Service
  user-service:
    image: maven:3.9-eclipse-temurin-17
    container_name: user-service
    restart: on-failure
    working_dir: /app
    volumes:
      - ./user-service:/app
      - maven-repo:/root/.m2
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      JAVA_OPTS: "-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: ${ZIPKIN_ENDPOINT}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
    command: bash -c "mvn spring-boot:run -Dspring-boot.run.jvmArguments='-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}'"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_started
    networks:
      - skillsync-network

  # Skill Service
  skill-service:
    image: maven:3.9-eclipse-temurin-17
    container_name: skill-service
    restart: on-failure
    working_dir: /app
    volumes:
      - ./skill-service:/app
      - maven-repo:/root/.m2
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      JAVA_OPTS: "-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: ${ZIPKIN_ENDPOINT}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
    command: bash -c "mvn spring-boot:run -Dspring-boot.run.jvmArguments='-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}'"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_started
    networks:
      - skillsync-network

  # Session Service
  session-service:
    image: maven:3.9-eclipse-temurin-17
    container_name: session-service
    restart: on-failure
    working_dir: /app
    volumes:
      - ./session-service:/app
      - maven-repo:/root/.m2
    ports:
      - "8084:8084"
    env_file:
      - .env
    environment:
      JAVA_OPTS: "-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: ${ZIPKIN_ENDPOINT}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
    command: bash -c "mvn spring-boot:run -Dspring-boot.run.jvmArguments='-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}'"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_started
    networks:
      - skillsync-network

  # Mentor Service
  mentor-service:
    image: maven:3.9-eclipse-temurin-17
    container_name: mentor-service
    restart: on-failure
    working_dir: /app
    volumes:
      - ./mentor-service:/app
      - maven-repo:/root/.m2
    ports:
      - "8085:8085"
    env_file:
      - .env
    environment:
      JAVA_OPTS: "-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: ${ZIPKIN_ENDPOINT}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
    command: bash -c "mvn spring-boot:run -Dspring-boot.run.jvmArguments='-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}'"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_started
    networks:
      - skillsync-network

  # Group Service
  group-service:
    image: maven:3.9-eclipse-temurin-17
    container_name: group-service
    restart: on-failure
    working_dir: /app
    volumes:
      - ./group-service:/app
      - maven-repo:/root/.m2
    ports:
      - "8086:8086"
    env_file:
      - .env
    environment:
      JAVA_OPTS: "-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: ${ZIPKIN_ENDPOINT}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
    command: bash -c "mvn spring-boot:run -Dspring-boot.run.jvmArguments='-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}'"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_started
    networks:
      - skillsync-network

  # Review Service
  review-service:
    image: maven:3.9-eclipse-temurin-17
    container_name: review-service
    restart: on-failure
    working_dir: /app
    volumes:
      - ./review-service:/app
      - maven-repo:/root/.m2
    ports:
      - "8087:8087"
    env_file:
      - .env
    environment:
      JAVA_OPTS: "-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: ${ZIPKIN_ENDPOINT}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
    command: bash -c "mvn spring-boot:run -Dspring-boot.run.jvmArguments='-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}'"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_started
    networks:
      - skillsync-network

  # Notification Service
  notification-service:
    image: maven:3.9-eclipse-temurin-17
    container_name: notification-service
    restart: on-failure
    working_dir: /app
    volumes:
      - ./notification-service:/app
      - maven-repo:/root/.m2
    ports:
      - "8088:8088"
    env_file:
      - .env
    environment:
      JAVA_OPTS: "-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: ${ZIPKIN_ENDPOINT}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE}
    command: bash -c "mvn spring-boot:run -Dspring-boot.run.jvmArguments='-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}'"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_started
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - skillsync-network

  # Payment Gateway
  payment-gateway:
    image: maven:3.9-eclipse-temurin-17
    container_name: payment-gateway
    restart: on-failure
    working_dir: /app
    volumes:
      - ./payment-gateway:/app
      - maven-repo:/root/.m2
    ports:
      - "8089:8089"
    env_file:
      - .env
    environment:
      JAVA_OPTS: "-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: ${ZIPKIN_ENDPOINT}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE}
    command: bash -c "mvn spring-boot:run -Dspring-boot.run.jvmArguments='-Dspring.profiles.active=${SPRING_PROFILES_ACTIVE}'"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_started
    networks:
      - skillsync-network

  # Loki - Log aggregation
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - skillsync-network

  # Promtail - Log collector
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./promtail-config.yml:/etc/promtail/promtail-config.yml
      - ./auth-service/logs:/logs/auth-service
      - ./user-service/logs:/logs/user-service
      - ./skill-service/logs:/logs/skill-service
      - ./session-service/logs:/logs/session-service
      - ./mentor-service/logs:/logs/mentor-service
      - ./group-service/logs:/logs/group-service
      - ./review-service/logs:/logs/review-service
      - ./notification-service/logs:/logs/notification-service
      - ./payment-gateway/logs:/logs/payment-gateway
      - ./api-gateway/logs:/logs/api-gateway
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    networks:
      - skillsync-network

  # SonarQube - Code Quality
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/${SONAR_POSTGRES_DB}
      SONAR_JDBC_USERNAME: ${SONAR_POSTGRES_USER}
      SONAR_JDBC_PASSWORD: ${SONAR_POSTGRES_PASSWORD}
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-logs:/opt/sonarqube/logs
      - sonarqube-extensions:/opt/sonarqube/extensions
    depends_on:
      sonar-db:
        condition: service_healthy
    networks:
      - skillsync-network

  # PostgreSQL for SonarQube
  sonar-db:
    image: postgres:15
    container_name: sonar-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${SONAR_POSTGRES_USER}
      POSTGRES_PASSWORD: ${SONAR_POSTGRES_PASSWORD}
      POSTGRES_DB: ${SONAR_POSTGRES_DB}
    volumes:
      - sonar-db-data:/var/lib/postgresql/data
    networks:
      - skillsync-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - skillsync-network

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - skillsync-network

networks:
  skillsync-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  zipkin-mysql-data:
    driver: local
  maven-repo:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local
  sonarqube-data:
    driver: local
  sonarqube-logs:
    driver: local
  sonarqube-extensions:
    driver: local
  sonar-db-data:
    driver: local
