# ==========================================
# AUTH SERVICE - DEV PROFILE
# Run locally: mvn spring-boot:run -Dspring.profiles.active=dev
# ==========================================

# DATABASE - local MySQL
spring.datasource.url=jdbc:mysql://localhost:${DB_PORT:3306}/skill_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}

# JPA - verbose for dev
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# EUREKA - local
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# RABBITMQ - local
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672

# REDIS - local
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ZIPKIN - local
management.zipkin.tracing.endpoint=http://localhost:${ZIPKIN_PORT:9411}/api/v2/spans
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}

# LOGGING - verbose in dev
logging.level.root=DEBUG
logging.level.com.skillsync.authservice=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# SWAGGER - enabled in dev
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
