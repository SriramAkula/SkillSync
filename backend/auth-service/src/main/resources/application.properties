# ==========================================
# APPLICATION
# ==========================================
server.port=8081
spring.application.name=auth-service
spring.cloud.config.enabled=false

# ==========================================
# MYSQL DATABASE
# ==========================================
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/skill_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# EUREKA CLIENT
# ==========================================
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://eureka-server:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ==========================================
# LOGGING
# ==========================================
logging.level.root=INFO
logging.level.com.skillsync.authservice=DEBUG

# ==========================================
# FEIGN CLIENT
# ==========================================
feign.lazy-attributes-resolution=true

# ==========================================
# SWAGGER SERVER URL
# ==========================================
api.gateway.url=${API_GATEWAY_URL:http://localhost:9090/api}

# ==========================================
# SPRINGDOC / OPENAPI / SWAGGER
# ==========================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/v3/api-docs

springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.use-root-path=true
springdoc.show-actuator=false
springdoc.enable-spring-security-support=true
springdoc.swagger-ui.display-request-duration=true
springdoc.scan-packages=com.skillsync.authservice.controller
springdoc.webjars.prefix=/webjars
springdoc.cache.disabled=false

# ==========================================
# JWT CONFIGURATION
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ==========================================
# GOOGLE OAUTH2
# ==========================================
google.oauth2.client-id=${GOOGLE_CLIENT_ID}
google.oauth2.client-secret=${GOOGLE_CLIENT_SECRET}


# ==========================================
# MAIL - OTP VERIFICATION
# ==========================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ==========================================
# RABBITMQ
# ==========================================
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=/
spring.rabbitmq.connection-timeout=10000

# ==========================================
# ZIPKIN DISTRIBUTED TRACING (Micrometer)
# ==========================================
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.endpoints.web.exposure.include=health,prometheus,metrics,tracing
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
logging.level.io.micrometer.tracing=DEBUG
logging.level.brave=DEBUG

# ==========================================
# REDIS - CQRS CACHING
# ==========================================
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.data.redis.client-type=lettuce
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.shutdown-timeout=2000ms

# ==========================================
# SPRING CACHE - CQRS PATTERN
# ==========================================
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.interceptor-order=999

# ==========================================
# RESILIENCE4J - CIRCUIT BREAKER & RETRY
# ==========================================
resilience4j.circuitbreaker.instances.authEventPublisher.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.authEventPublisher.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.authEventPublisher.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.authEventPublisher.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.authEventPublisher.wait-duration-in-open-state=5000
resilience4j.circuitbreaker.instances.authEventPublisher.reset-timeout-duration=10000

resilience4j.retry.instances.authEventPublisher.max-attempts=3
resilience4j.retry.instances.authEventPublisher.wait-duration=1000
resilience4j.retry.instances.authEventPublisher.retry-exceptions=org.springframework.amqp.AmqpException,java.io.IOException

# ==========================================
# OTP CONFIGURATION
# ==========================================
otp.ttl.minutes=5
otp.verified.ttl.minutes=15
otp.pwd-reset.ttl.minutes=10

# ==========================================
# REDIS TIMEOUT CONFIGURATION
# ==========================================
redis.command.timeout.seconds=2
redis.shutdown.timeout.millis=100
redis.cache.ttl.minutes=60

# ==========================================
# ADMIN SEED ACCOUNTS
# ==========================================
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}
admin.username=${ADMIN_USERNAME}
superadmin.email=${SUPERADMIN_EMAIL}
superadmin.password=${SUPERADMIN_PASSWORD}
superadmin.username=${SUPERADMIN_USERNAME}
