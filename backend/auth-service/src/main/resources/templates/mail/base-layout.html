<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f4f7f6; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); padding: 30px; text-align: center; color: white; }
        .header h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        .content { padding: 40px; }
        .footer { background: #f9fafb; padding: 20px; text-align: center; color: #6b7280; font-size: 12px; border-top: 1px solid #edf2f7; }
        .button { display: inline-block; padding: 12px 24px; background-color: #6366f1; color: white !important; text-decoration: none; border-radius: 6px; font-weight: 600; margin-top: 20px; }
        .otp-box { background: #f3f4f6; border: 2px dashed #6366f1; padding: 20px; text-align: center; font-size: 32px; font-weight: 700; color: #4f46e5; letter-spacing: 8px; border-radius: 8px; margin: 25px 0; }
        .highlight { color: #6366f1; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SkillSync</h1>
        </div>
        <div class="content">
            <div th:replace="~{__${template}__ :: content}"></div>
        </div>
        <div class="footer">
            <p>&copy; 2026 SkillSync Platform. All rights reserved.</p>
            <p>If you have any questions, contact us at support@skillsync.me</p>
        </div>
    </div>
</body>
</html>
