global:
  scrape_interval: 30s

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:9090']
    relabel_configs:
      - source_labels: [job]
        target_label: application
      - source_labels: [job]
        target_label: namespace

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8081']
