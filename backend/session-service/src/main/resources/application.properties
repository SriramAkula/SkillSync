server.port=8084
spring.application.name=session-service
spring.cloud.config.enabled=false
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/skill_session?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://eureka-server:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
management.endpoints.web.exposure.include=health,info
logging.level.root=INFO
logging.level.com.skillsync.session=DEBUG
logging.file.name=logs/session-service.log

# ==========================================
# SPRINGDOC / OPENAPI / SWAGGER
# ==========================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/v3/api-docs

springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.use-root-path=true
springdoc.show-actuator=false
springdoc.enable-spring-security-support=true
springdoc.swagger-ui.display-request-duration=true
springdoc.scan-packages=com.skillsync.session.controller
springdoc.webjars.prefix=/webjars
springdoc.cache.disabled=false

# ==========================================
# SWAGGER SERVER URL
# ==========================================
api.gateway.url=${API_GATEWAY_URL:http://localhost:9090/api}


# ==========================================
# ZIPKIN DISTRIBUTED TRACING (Micrometer)
# ==========================================
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.endpoints.web.exposure.include=health,prometheus,metrics,tracing
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
logging.level.io.micrometer.tracing=DEBUG
logging.level.brave=DEBUG

# ==========================================
# REDIS - CQRS CACHING
# ==========================================
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.data.redis.client-type=lettuce
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.shutdown-timeout=2000ms

# ==========================================
# SPRING CACHE - CQRS PATTERN
# ==========================================
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.interceptor-order=999

# ==========================================
# RESILIENCE4J - CIRCUIT BREAKER & RETRY
# ==========================================
resilience4j.circuitbreaker.instances.sessionEventPublisher.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.sessionEventPublisher.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.sessionEventPublisher.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.sessionEventPublisher.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.sessionEventPublisher.wait-duration-in-open-state=5000
resilience4j.circuitbreaker.instances.sessionEventPublisher.reset-timeout-duration=10000

resilience4j.retry.instances.sessionEventPublisher.max-attempts=3
resilience4j.retry.instances.sessionEventPublisher.wait-duration=1000
resilience4j.retry.instances.sessionEventPublisher.retry-exceptions=org.springframework.amqp.AmqpException,java.io.IOException

