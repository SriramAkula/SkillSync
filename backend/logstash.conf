input {
  # TCP input for logs from Spring Boot applications
  tcp {
    port => 5000
    codec => json
  }
  
  # UDP input as fallback
  udp {
    port => 5000
    codec => json
  }
}

filter {
  # Parse timestamp
  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }
  
  # Add service name if available
  if ![service] {
    mutate {
      add_field => { "service" => "unknown" }
    }
  }
  
  # Parse log level
  if [level] {
    mutate {
      lowercase => [ "level" ]
    }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logs-%{+yyyy.MM.dd}"
  }
  
  # Optional: Also output to stdout for debugging
  stdout {
    codec => rubydebug
  }
}
