# ==========================================
# MESSAGING SERVICE - TEST PROFILE
# ==========================================

# DATABASE (In-Memory H2)
spring.datasource.url=jdbc:h2:mem:skill_messaging_test
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# EUREKA
eureka.client.enabled=false

# RABBITMQ (Mocked in tests)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672

# REDIS (Embedded for tests)
spring.cache.type=simple

# JWT
jwt.secret=test-secret-key
jwt.expiration=3600000

# LOGGING
logging.level.root=WARN
logging.level.com.skillsync.messaging=DEBUG

# RESILIENCE4J
resilience4j.circuitbreaker.instances.messagingService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.messagingService.failureRateThreshold=50

resilience4j.retry.instances.messagingService.maxAttempts=2
resilience4j.retry.instances.messagingService.waitDuration=100
