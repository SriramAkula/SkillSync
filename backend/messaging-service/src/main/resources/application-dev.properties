# ==========================================
# MESSAGING SERVICE - DEV PROFILE
# ==========================================

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:${DB_PORT:3306}/skill_messaging?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# RABBITMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
rabbitmq.exchange=skillsync.exchange
rabbitmq.routing-key=message.sent

# REDIS CACHE
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# ZIPKIN
management.zipkin.tracing.endpoint=http://localhost:${ZIPKIN_PORT:9411}/api/v2/spans
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}

# JWT
jwt.secret=SkillSyncSuperSecretKeyForJWTNormalization2024!
jwt.expiration=86400000

# LOGGING
logging.level.root=DEBUG
logging.level.com.skillsync.messaging=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# SWAGGER
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# FEIGN CLIENT CONFIGURATION
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

# RESILIENCE4J - CIRCUIT BREAKER & RETRY
resilience4j.circuitbreaker.instances.messagingService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.messagingService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.messagingService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.messagingService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.messagingService.waitDurationInOpenState=10000
resilience4j.circuitbreaker.instances.messagingService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.messagingService.automaticTransitionFromOpenToHalfOpenEnabled=true

resilience4j.retry.instances.messagingService.maxAttempts=3
resilience4j.retry.instances.messagingService.waitDuration=500
resilience4j.retry.instances.messagingService.enableExponentialBackoff=true
resilience4j.retry.instances.messagingService.exponentialBackoffMultiplier=2

resilience4j.timelimiter.instances.messagingService.timeoutDuration=3s
resilience4j.timelimiter.instances.messagingService.cancelRunningFuture=true
