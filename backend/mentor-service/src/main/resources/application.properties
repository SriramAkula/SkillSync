# ==========================================
# APPLICATION
# ==========================================
server.port=8085
spring.application.name=mentor-service
spring.cloud.config.enabled=false

# ==========================================
# MYSQL DATABASE
# ==========================================
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/skill_mentor?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# EUREKA CLIENT
# ==========================================
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://eureka-server:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ==========================================
# SPRINGDOC / OPENAPI / SWAGGER
# ==========================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/v3/api-docs

springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.use-root-path=true
springdoc.show-actuator=false
springdoc.enable-spring-security-support=true
springdoc.swagger-ui.display-request-duration=true
springdoc.scan-packages=com.skillsync.mentor.controller
springdoc.webjars.prefix=/webjars
springdoc.cache.disabled=false

# ==========================================
# SWAGGER SERVER URL
# ==========================================
api.gateway.url=${API_GATEWAY_URL:http://localhost:9090/api}

# ==========================================
# RABBITMQ
# ==========================================
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ==========================================
# ACTUATOR
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ==========================================
# LOGGING
# ==========================================
logging.level.root=INFO
logging.level.com.skillsync.mentor=DEBUG
logging.file.name=logs/mentor-service.log


# ==========================================
# ZIPKIN DISTRIBUTED TRACING (Micrometer)
# ==========================================
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.endpoints.web.exposure.include=health,prometheus,metrics,tracing
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
logging.level.io.micrometer.tracing=DEBUG
logging.level.brave=DEBUG

# ==========================================
# FEIGN CLIENT CONFIGURATION
# ==========================================
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
feign.client.config.default.loggerLevel=basic

# ==========================================
# RESILIENCE4J - CIRCUIT BREAKER FOR FEIGN
# ==========================================
resilience4j.circuitbreaker.instances.auth-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.auth-service.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.auth-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.auth-service.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.auth-service.wait-duration-in-open-state=5000
resilience4j.circuitbreaker.instances.auth-service.reset-timeout-duration=10000

resilience4j.retry.instances.auth-service.max-attempts=3
resilience4j.retry.instances.auth-service.wait-duration=1000
resilience4j.retry.instances.auth-service.retry-exceptions=java.io.IOException,feign.FeignException

# ==========================================
# REDIS - CQRS CACHING
# ==========================================
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.data.redis.client-type=lettuce
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.shutdown-timeout=2000ms

# ==========================================
# SPRING CACHE - CQRS PATTERN
# ==========================================
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
