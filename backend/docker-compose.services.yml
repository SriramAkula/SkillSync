version: "3.9"

services:
  # ─── Microservices Layer ──────────────────────────────────────────────────

  api-gateway:
    image: ${DOCKER_USERNAME}/skillsync-api-gateway:latest
    container_name: api-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE}
    depends_on:
      eureka-server:
        condition: service_started
      config-server:
        condition: service_healthy
      zipkin:
        condition: service_started
    networks:
      - private-network
      - proxy-network

  auth-service:
    image: ${DOCKER_USERNAME}/skillsync-auth-service:latest
    container_name: auth-service
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
      config-server:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - private-network
      - proxy-network

  user-service:
    image: ${DOCKER_USERNAME}/skillsync-user-service:latest
    container_name: user-service
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
      config-server:
        condition: service_healthy
    networks:
      - private-network

  skill-service:
