version: "3.9"

services:
  # ─── Microservices Layer ──────────────────────────────────────────────────

  api-gateway:
    image: skillsyncadmin.azurecr.io/skillsync-api-gateway:latest
    container_name: api-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE}
    depends_on:
      eureka-server:
        condition: service_started
      config-server:
        condition: service_healthy
      zipkin:
        condition: service_started
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - private-network
      - proxy-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  auth-service:
    image: skillsyncadmin.azurecr.io/skillsync-auth-service:latest
    container_name: auth-service
    restart: unless-stopped
    env_file: .env
    environment:
