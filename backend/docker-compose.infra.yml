version: "3.9"

services:
  # ─── Infrastructure Layer ──────────────────────────────────────────────────

  config-server:
    image: ${DOCKER_USERNAME}/skillsync-config-server:latest
    container_name: config-server
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      CONFIG_REPO_URI: ${CONFIG_REPO_URI}
      CONFIG_REPO_USERNAME: ${CONFIG_REPO_USERNAME}
      CONFIG_REPO_PASSWORD: ${CONFIG_REPO_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE}
    depends_on:
      eureka-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - private-network
      - proxy-network

  zipkin-mysql:
    image: mysql:8.0
    container_name: zipkin-mysql
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${ZIPKIN_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${ZIPKIN_MYSQL_DATABASE}
      MYSQL_USER: ${ZIPKIN_MYSQL_USER}
      MYSQL_PASSWORD: ${ZIPKIN_MYSQL_PASSWORD}
    volumes:
      - zipkin-mysql-data:/var/lib/mysql
      - ./zipkin-schema.sql:/docker-entrypoint-initdb.d/zipkin-schema.sql
    networks:
      - private-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: skillsync-mysql
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_MAIN_DATABASE}
      MYSQL_ROOT_HOST: ${MYSQL_ROOT_HOST}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - private-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    networks:
      - private-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    networks:
      - private-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    image: ${DOCKER_USERNAME}/skillsync-eureka-server:latest
    container_name: eureka-server
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
    depends_on:
      zipkin:
        condition: service_started
    networks:
      - private-network
      - proxy-network

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin-server
    restart: unless-stopped
    env_file: .env
    environment:
      STORAGE_TYPE: mysql
      MYSQL_HOST: zipkin-mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${ZIPKIN_MYSQL_USER}
      MYSQL_PASS: ${ZIPKIN_MYSQL_PASSWORD}
      MYSQL_DB: ${ZIPKIN_MYSQL_DATABASE}
    depends_on:
      zipkin-mysql:
        condition: service_healthy
    networks:
      - private-network
      - proxy-network

networks:
  private-network:
    driver: bridge
    internal: true
    name: skillsync-private

  proxy-network:
    external: true
    name: skillsync-proxy

volumes:
  mysql-data:
  zipkin-mysql-data:
