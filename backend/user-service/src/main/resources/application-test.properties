# ==========================================
# USER SERVICE - TEST PROFILE
# ==========================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
spring.cloud.discovery.enabled=false
spring.cache.type=none
spring.autoconfigure.exclude[0]=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
spring.autoconfigure.exclude[1]=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
management.tracing.sampling.probability=0.0
logging.level.root=WARN
logging.level.com.skillsync.user=INFO
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ==========================================
# MINIO CLOUD STORAGE (TEST)
# ==========================================
minio.url=http://localhost:9000
minio.access.key=admin
minio.secret.key=secret-test-key
minio.bucket.public=skillsync-public-test
minio.bucket.private=skillsync-private-test
