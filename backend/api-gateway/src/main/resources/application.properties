# ==========================================
# SWAGGER UI
# ==========================================
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha

springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth/v3/api-docs
springdoc.swagger-ui.urls[1].name=User Service
springdoc.swagger-ui.urls[1].url=/user/v3/api-docs
springdoc.swagger-ui.urls[2].name=Skill Service
springdoc.swagger-ui.urls[2].url=/skill/v3/api-docs
springdoc.swagger-ui.urls[3].name=Group Service
springdoc.swagger-ui.urls[3].url=/group/v3/api-docs
springdoc.swagger-ui.urls[4].name=Mentor Service
springdoc.swagger-ui.urls[4].url=/mentor/v3/api-docs
springdoc.swagger-ui.urls[5].name=Session Service
springdoc.swagger-ui.urls[5].url=/session/v3/api-docs
springdoc.swagger-ui.urls[6].name=Review Service
springdoc.swagger-ui.urls[6].url=/review/v3/api-docs
springdoc.swagger-ui.urls[7].name=Notification Service
springdoc.swagger-ui.urls[7].url=/notification/v3/api-docs
springdoc.swagger-ui.urls[8].name=Payment Gateway
springdoc.swagger-ui.urls[8].url=/payment/v3/api-docs

# ==========================================
# ZIPKIN DISTRIBUTED TRACING
# ==========================================
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.endpoints.web.exposure.include=health,prometheus,metrics,tracing
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
