# ==========================================
# APPLICATION
# ==========================================
server.port=9090
spring.application.name=api-gateway
spring.cloud.config.enabled=false
spring.cloud.compatibility-verifier.enabled=false
server.forward-headers-strategy=framework

# ==========================================
# CORS
# ==========================================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200,http://localhost:4201
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600

# ==========================================
# EUREKA CLIENT
# ==========================================
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://eureka-server:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ==========================================
# JWT
# ==========================================
jwt.secret=${JWT_SECRET:skildsyncSecretKey123456789012345678901234567890123456789}
jwt.expiration=3600000

# ==========================================
# GATEWAY ROUTES - API DOCS
# ==========================================
spring.cloud.gateway.routes[0].id=auth-service-docs
spring.cloud.gateway.routes[0].uri=http://auth-service:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/v3/api-docs,/auth/v3/api-docs/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[0].order=-20

spring.cloud.gateway.routes[1].id=user-service-docs
spring.cloud.gateway.routes[1].uri=http://user-service:8082
